<!DOCTYPE html>
<html>
<head>
<title>Maze Algorithm Comparison</title>
<style>
body{
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}
canvas{
    border:2px solid #444;
}
</style>
</head>

<body>

<canvas id="canvas" width="1600" height="800"></canvas>

<script>

let bfsStats={visited:0,pathLength:0,time:0};
let dfsStats={visited:0,pathLength:0,time:0};
let biStats={visited:0,pathLength:0,time:0};
let dijkstraStats={visited:0,pathLength:0,time:0};

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const ROWS=111;
const COLS=111;

const CELL=Math.min(800/COLS,400/ROWS);

let maze=[];

const start=[1,1];
const end=[COLS-2,ROWS-2];

let bfsVisited=new Set();
let dfsVisited=new Set();
let biVisited=new Set();
let dijkstraVisited=new Set();

let bfsPath=new Set();
let dfsPath=new Set();
let biPath=new Set();
let dijkstraPath=new Set();

function key(x,y){return x+","+y;}

function initMaze(){
    maze=[];
    for(let y=0;y<ROWS;y++){
        let row=[];
        for(let x=0;x<COLS;x++) row.push(1);
        maze.push(row);
    }
}

function drawMaze(offsetX,offsetY,visited,path,colorVisit){
    let mazeHeight=ROWS*CELL;
    let centerOffsetY=offsetY+(400-mazeHeight)/2;

    for(let y=0;y<ROWS;y++){
        for(let x=0;x<COLS;x++){

            let color;

            if(x===start[0]&&y===start[1]) color="lime";
            else if(x===end[0]&&y===end[1]) color="red";
            else if(path.has(key(x,y))) color="yellow";
            else if(visited.has(key(x,y))) color=colorVisit;
            else if(maze[y][x]===1) color="black";
            else color="rgb(200,200,200)";

            ctx.fillStyle=color;
            ctx.fillRect(offsetX+x*CELL,centerOffsetY+y*CELL,CELL,CELL);
        }
    }
}

function draw(){
    ctx.fillStyle="rgb(30,30,30)";
    ctx.fillRect(0,0,1600,800);

    drawMaze(0,0,bfsVisited,bfsPath,"rgb(50,150,255)");
    drawMaze(800,0,dfsVisited,dfsPath,"rgb(255,120,50)");
    drawMaze(0,400,biVisited,biPath,"rgb(180,100,255)");
    drawMaze(800,400,dijkstraVisited,dijkstraPath,"rgb(100,255,150)");

    ctx.fillStyle="white";
    ctx.font="18px Arial";

    ctx.fillText("BFS",350,20);
    ctx.fillText("DFS",1150,20);
    ctx.fillText("Bi-BFS",330,420);
    ctx.fillText("Dijkstra",1120,420);

    ctx.font="14px Arial";

    ctx.fillText(`Visited: ${bfsStats.visited}`,20,30);
    ctx.fillText(`Path: ${bfsStats.pathLength}`,20,50);
    ctx.fillText(`Time: ${bfsStats.time} ms`,20,70);

    ctx.fillText(`Visited: ${dfsStats.visited}`,820,30);
    ctx.fillText(`Path: ${dfsStats.pathLength}`,820,50);
    ctx.fillText(`Time: ${dfsStats.time} ms`,820,70);

    ctx.fillText(`Visited: ${biStats.visited}`,20,430);
    ctx.fillText(`Path: ${biStats.pathLength}`,20,450);
    ctx.fillText(`Time: ${biStats.time} ms`,20,470);

    ctx.fillText(`Visited: ${dijkstraStats.visited}`,820,430);
    ctx.fillText(`Path: ${dijkstraStats.pathLength}`,820,450);
    ctx.fillText(`Time: ${dijkstraStats.time} ms`,820,470);
}

function generateMaze(){
    initMaze();
    let stack=[[1,1]];

    while(stack.length){
        let [x,y]=stack[stack.length-1];
        maze[y][x]=0;

        let neighbors=[];

        [[2,0],[-2,0],[0,2],[0,-2]].forEach(([dx,dy])=>{
            let nx=x+dx,ny=y+dy;
            if(nx>0&&nx<COLS-1&&ny>0&&ny<ROWS-1&&maze[ny][nx]===1){
                neighbors.push([nx,ny,dx,dy]);
            }
        });

        if(neighbors.length){
            let [nx,ny,dx,dy]=neighbors[Math.floor(Math.random()*neighbors.length)];
            maze[y+dy/2][x+dx/2]=0;
            stack.push([nx,ny]);
        }else stack.pop();
    }

    maze[start[1]][start[0]]=0;
    maze[end[1]][end[0]]=0;
}

function bfs(){
    let startTime=performance.now();
    let queue=[start];
    let parent={};
    parent[key(start[0],start[1])]=null;

    function step(){
        if(!queue.length) return;

        let [x,y]=queue.shift();

        if(x===end[0]&&y===end[1]){
            let cur=key(end[0],end[1]),length=0;
            while(cur){bfsPath.add(cur);cur=parent[cur];length++;}
            bfsStats.pathLength=length;
            bfsStats.time=(performance.now()-startTime).toFixed(2);
            draw();return;
        }

        for(let [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){
            let nx=x+dx,ny=y+dy;
            let k=key(nx,ny);

            if(nx>=0&&nx<COLS&&ny>=0&&ny<ROWS){
                if(maze[ny][nx]===0&&!(k in parent)){
                    parent[k]=key(x,y);
                    queue.push([nx,ny]);
                    bfsVisited.add(k);
                    bfsStats.visited++;
                }
            }
        }

        draw();
        requestAnimationFrame(step);
    }
    step();
}

function dfs(){
    let stack=[start];
    let parent={};
    let startTime=performance.now();
    parent[key(start[0],start[1])]=null;

    function step(){
        if(!stack.length) return;

        let [x,y]=stack.pop();

        if(x===end[0]&&y===end[1]){
            let cur=key(end[0],end[1]),length=0;
            while(cur){dfsPath.add(cur);cur=parent[cur];length++;}
            dfsStats.pathLength=length;
            dfsStats.time=(performance.now()-startTime).toFixed(2);
            draw();return;
        }

        for(let [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){
            let nx=x+dx,ny=y+dy;
            let k=key(nx,ny);

            if(nx>=0&&nx<COLS&&ny>=0&&ny<ROWS){
                if(maze[ny][nx]===0&&!(k in parent)){
                    parent[k]=key(x,y);
                    stack.push([nx,ny]);
                    dfsVisited.add(k);
                    dfsStats.visited++;
                }
            }
        }

        draw();
        requestAnimationFrame(step);
    }
    step();
}

function biBfs(){
    let startTime=performance.now();

    let qStart=[start];
    let qEnd=[end];

    let parentStart={},parentEnd={};
    parentStart[key(start[0],start[1])]=null;
    parentEnd[key(end[0],end[1])]=null;

    function step(){
        if(!qStart.length||!qEnd.length) return;

        let expand=(queue,parent,otherParent)=>{

            let [x,y]=queue.shift();

            for(let [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){

                let nx=x+dx,ny=y+dy;
                let k=key(nx,ny);

                if(nx>=0&&nx<COLS&&ny>=0&&ny<ROWS){

                    if(maze[ny][nx]===0&&!(k in parent)){

                        parent[k]=key(x,y);
                        queue.push([nx,ny]);

                        biVisited.add(k);
                        biStats.visited++;

                        if(k in otherParent){

                            let meet=k;
                            let length=0;

                            let cur=meet;
                            while(cur){
                                biPath.add(cur);
                                cur=parentStart[cur];
                                length++;
                            }

                            cur=parentEnd[meet];
                            while(cur){
                                biPath.add(cur);
                                cur=parentEnd[cur];
                                length++;
                            }

                            biStats.pathLength=length;
                            biStats.time=(performance.now()-startTime).toFixed(2);

                            draw();
                            return true;
                        }
                    }
                }
            }
            return false;
        };

        if(expand(qStart,parentStart,parentEnd)) return;
        if(expand(qEnd,parentEnd,parentStart)) return;

        draw();
        requestAnimationFrame(step);
    }
    step();
}

function dijkstra(){
    let startTime=performance.now();

    let dist={},parent={};
    let pq=[[0,start]];

    dist[key(start[0],start[1])]=0;
    parent[key(start[0],start[1])]=null;

    function step(){
        if(!pq.length) return;

        pq.sort((a,b)=>a[0]-b[0]);
        let [d,[x,y]]=pq.shift();

        if(x===end[0]&&y===end[1]){
            let cur=key(end[0],end[1]),length=0;
            while(cur){dijkstraPath.add(cur);cur=parent[cur];length++;}
            dijkstraStats.pathLength=length;
            dijkstraStats.time=(performance.now()-startTime).toFixed(2);
            draw();return;
        }

        for(let [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){

            let nx=x+dx,ny=y+dy;
            let k=key(nx,ny);

            if(nx>=0&&nx<COLS&&ny>=0&&ny<ROWS){

                if(maze[ny][nx]===0){

                    let nd=d+1;

                    if(!(k in dist)||nd<dist[k]){
                        dist[k]=nd;
                        parent[k]=key(x,y);
                        pq.push([nd,[nx,ny]]);

                        dijkstraVisited.add(k);
                        dijkstraStats.visited++;
                    }
                }
            }
        }

        draw();
        requestAnimationFrame(step);
    }
    step();
}

document.addEventListener("keydown",(e)=>{

    if(e.code==="Space"){

        [bfsVisited,dfsVisited,biVisited,dijkstraVisited].forEach(s=>s.clear());
        [bfsPath,dfsPath,biPath,dijkstraPath].forEach(s=>s.clear());

        bfsStats={visited:0,pathLength:0,time:0};
        dfsStats={visited:0,pathLength:0,time:0};
        biStats={visited:0,pathLength:0,time:0};
        dijkstraStats={visited:0,pathLength:0,time:0};

        bfs();
        dfs();
        biBfs();
        dijkstra();
    }

    if(e.key==="r"){
        generateMaze();
        draw();
    }

});

generateMaze();
draw();

</script>

</body>
</html>

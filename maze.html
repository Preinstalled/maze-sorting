<!DOCTYPE html>
<html>
<head>
<title>Maze Algorithm Visualizer</title>
<style>
body{
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}
canvas{
    border:2px solid #444;
}
</style>
</head>

<body>
<canvas id="canvas" width="1800" height="900"></canvas>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const ROWS=81;
const COLS=81;
const CELL=Math.min(600/COLS,300/ROWS);

let maze=[];
const start=[1,1];
const end=[COLS-2,ROWS-2];

function key(x,y){return x+","+y;}

let bfsVisited=new Set(), dfsVisited=new Set(), biVisited=new Set(), dijkstraVisited=new Set(), aStarVisited=new Set(), bellmanVisited=new Set();
let bfsPath=new Set(), dfsPath=new Set(), biPath=new Set(), dijkstraPath=new Set(), aStarPath=new Set(), bellmanPath=new Set();
let ffVisited=new Set(), ekVisited=new Set(), ffPath=new Set(), ekPath=new Set();

let bfsStats, dfsStats, biStats, dijkstraStats, aStarStats, bellmanStats, ffStats, ekStats;

function resetStats(){
    bfsStats={visited:0,pathLength:0,time:0};
    dfsStats={visited:0,pathLength:0,time:0};
    biStats={visited:0,pathLength:0,time:0};
    dijkstraStats={visited:0,pathLength:0,time:0};
    aStarStats={visited:0,pathLength:0,time:0};
    bellmanStats={visited:0,pathLength:0,time:0};
    ffStats={visited:0,maxFlow:0,time:0};
    ekStats={visited:0,maxFlow:0,time:0};
}

function clearAll(){
    [bfsVisited,dfsVisited,biVisited,dijkstraVisited,aStarVisited,bellmanVisited,ffVisited,ekVisited].forEach(s=>s.clear());
    [bfsPath,dfsPath,biPath,dijkstraPath,aStarPath,bellmanPath,ffPath,ekPath].forEach(s=>s.clear());
    resetStats();
    draw();
}

function initMaze(){
    maze=[];
    for(let y=0;y<ROWS;y++){
        let row=[];
        for(let x=0;x<COLS;x++) row.push(1);
        maze.push(row);
    }
}

function generateMaze(){
    initMaze();
    let stack=[[1,1]];
    while(stack.length){
        let [x,y]=stack[stack.length-1];
        maze[y][x]=0;
        let n=[];
        [[2,0],[-2,0],[0,2],[0,-2]].forEach(([dx,dy])=>{
            let nx=x+dx,ny=y+dy;
            if(nx>0&&nx<COLS-1&&ny>0&&ny<ROWS-1&&maze[ny][nx]===1){
                n.push([nx,ny,dx,dy]);
            }
        });
        if(n.length){
            let [nx,ny,dx,dy]=n[Math.floor(Math.random()*n.length)];
            maze[y+dy/2][x+dx/2]=0;
            stack.push([nx,ny]);
        }else stack.pop();
    }
    maze[start[1]][start[0]]=0;
    maze[end[1]][end[0]]=0;
}

function drawMaze(offsetX,offsetY,visited,path,color){
    let h=ROWS*CELL;
    let offY=offsetY+(300-h)/2;

    for(let y=0;y<ROWS;y++){
        for(let x=0;x<COLS;x++){
            let c;
            if(x===start[0]&&y===start[1]) c="lime";
            else if(x===end[0]&&y===end[1]) c="red";
            else if(path.has(key(x,y))) c="yellow";
            else if(visited.has(key(x,y))) c=color;
            else if(maze[y][x]===1) c="black";
            else c="rgb(200,200,200)";
            ctx.fillStyle=c;
            ctx.fillRect(offsetX+x*CELL,offY+y*CELL,CELL,CELL);
        }
    }
}

function draw(){
    ctx.fillStyle="#222";
    ctx.fillRect(0,0,1800,900);

    drawMaze(0,0,bfsVisited,bfsPath,"rgb(50,150,255)");
    drawMaze(600,0,dfsVisited,dfsPath,"rgb(255,120,50)");
    drawMaze(1200,0,aStarVisited,aStarPath,"rgb(255,255,100)");
    drawMaze(0,300,biVisited,biPath,"rgb(180,100,255)");
    drawMaze(600,300,dijkstraVisited,dijkstraPath,"rgb(100,255,150)");
    drawMaze(1200,300,bellmanVisited,bellmanPath,"rgb(255,100,100)");
    drawMaze(0,600,ffVisited,ffPath,"rgb(0,200,200)");
    drawMaze(600,600,ekVisited,ekPath,"rgb(255,0,255)");

    ctx.fillStyle="white";
    ctx.font="14px Arial";

    ctx.fillText(`BFS V:${bfsStats.visited} P:${bfsStats.pathLength}`,20,20);
    ctx.fillText(`DFS V:${dfsStats.visited} P:${dfsStats.pathLength}`,620,20);
    ctx.fillText(`A* V:${aStarStats.visited} P:${aStarStats.pathLength}`,1220,20);

    ctx.fillText(`Bi V:${biStats.visited} P:${biStats.pathLength}`,20,320);
    ctx.fillText(`Dij V:${dijkstraStats.visited} P:${dijkstraStats.pathLength}`,620,320);
    ctx.fillText(`Bell V:${bellmanStats.visited} P:${bellmanStats.pathLength}`,1220,320);

    ctx.fillText(`FF V:${ffStats.visited} F:${ffStats.maxFlow}`,20,620);
    ctx.fillText(`EK V:${ekStats.visited} F:${ekStats.maxFlow}`,620,620);
}

// --- BFS ---
function bfs(){
    let t=performance.now();
    let q=[start],p={}; p[key(...start)]=null;

    function step(){
        if(!q.length) return;
        let [x,y]=q.shift();
        if(x===end[0]&&y===end[1]){
            let cur=key(...end),l=0;
            while(cur){bfsPath.add(cur);cur=p[cur];l++;}
            bfsStats.pathLength=l;
            bfsStats.time=(performance.now()-t).toFixed(2);
            draw();return;
        }
        for(let [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){
            let nx=x+dx,ny=y+dy,k=key(nx,ny);
            if(nx>=0&&ny>=0&&nx<COLS&&ny<ROWS&&maze[ny][nx]===0&&!(k in p)){
                p[k]=key(x,y);
                q.push([nx,ny]);
                bfsVisited.add(k);
                bfsStats.visited++;
            }
        }
        draw();
        requestAnimationFrame(step);
    }
    step();
}

// --- DFS ---
function dfs(){
    let t=performance.now();
    let s=[start],p={}; p[key(...start)]=null;

    function step(){
        if(!s.length) return;
        let [x,y]=s.pop();
        if(x===end[0]&&y===end[1]){
            let cur=key(...end),l=0;
            while(cur){dfsPath.add(cur);cur=p[cur];l++;}
            dfsStats.pathLength=l;
            dfsStats.time=(performance.now()-t).toFixed(2);
            draw();return;
        }
        for(let [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){
            let nx=x+dx,ny=y+dy,k=key(nx,ny);
            if(nx>=0&&ny>=0&&nx<COLS&&ny<ROWS&&maze[ny][nx]===0&&!(k in p)){
                p[k]=key(x,y);
                s.push([nx,ny]);
                dfsVisited.add(k);
                dfsStats.visited++;
            }
        }
        draw();
        requestAnimationFrame(step);
    }
    step();
}

// --- A* ---
function aStar(){
    let t=performance.now();
    let open=[[0,start]],g={},p={};
    g[key(...start)]=0;
    p[key(...start)]=null;

    function h(x,y){return Math.abs(x-end[0])+Math.abs(y-end[1]);}

    function step(){
        if(!open.length) return;
        open.sort((a,b)=>a[0]-b[0]);
        let [_,[x,y]]=open.shift();
        if(x===end[0]&&y===end[1]){
            let cur=key(...end),l=0;
            while(cur){aStarPath.add(cur);cur=p[cur];l++;}
            aStarStats.pathLength=l;
            aStarStats.time=(performance.now()-t).toFixed(2);
            draw();return;
        }
        for(let [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){
            let nx=x+dx,ny=y+dy,k=key(nx,ny);
            if(nx>=0&&ny>=0&&nx<COLS&&ny<ROWS&&maze[ny][nx]===0){
                let tg=g[key(x,y)]+1;
                if(!(k in g)||tg<g[k]){
                    g[k]=tg;
                    p[k]=key(x,y);
                    open.push([tg+h(nx,ny),[nx,ny]]);
                    aStarVisited.add(k);
                    aStarStats.visited++;
                }
            }
        }
        draw();
        requestAnimationFrame(step);
    }
    step();
}

// --- Bi-BFS ---
function biBfs(){
    let t=performance.now();
    let qs=[start],qe=[end],ps={},pe={};
    ps[key(...start)]=null;
    pe[key(...end)]=null;

    function step(){
        if(!qs.length||!qe.length) return;

        let expand=(q,p,op)=>{
            let [x,y]=q.shift();
            for(let [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){
                let nx=x+dx,ny=y+dy,k=key(nx,ny);
                if(nx>=0&&ny>=0&&nx<COLS&&ny<ROWS&&maze[ny][nx]===0&&!(k in p)){
                    p[k]=key(x,y);
                    q.push([nx,ny]);
                    biVisited.add(k);
                    biStats.visited++;
                    if(k in op){
                        let cur=k,l=0;
                        while(cur){biPath.add(cur);cur=ps[cur];l++;}
                        cur=pe[k];
                        while(cur){biPath.add(cur);cur=pe[cur];l++;}
                        biStats.pathLength=l;
                        biStats.time=(performance.now()-t).toFixed(2);
                        draw();
                        return true;
                    }
                }
            }
            return false;
        };

        if(expand(qs,ps,pe)) return;
        if(expand(qe,pe,ps)) return;

        draw();
        requestAnimationFrame(step);
    }
    step();
}

// --- Dijkstra ---
function dijkstra(){
    let t=performance.now();
    let dist={},p={},pq=[[0,start]];
    dist[key(...start)]=0;
    p[key(...start)]=null;

    function step(){
        if(!pq.length) return;
        pq.sort((a,b)=>a[0]-b[0]);
        let [d,[x,y]]=pq.shift();
        if(x===end[0]&&y===end[1]){
            let cur=key(...end),l=0;
            while(cur){dijkstraPath.add(cur);cur=p[cur];l++;}
            dijkstraStats.pathLength=l;
            dijkstraStats.time=(performance.now()-t).toFixed(2);
            draw();return;
        }
        for(let [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){
            let nx=x+dx,ny=y+dy,k=key(nx,ny);
            if(nx>=0&&ny>=0&&nx<COLS&&ny<ROWS&&maze[ny][nx]===0){
                let nd=d+1;
                if(!(k in dist)||nd<dist[k]){
                    dist[k]=nd;
                    p[k]=key(x,y);
                    pq.push([nd,[nx,ny]]);
                    dijkstraVisited.add(k);
                    dijkstraStats.visited++;
                }
            }
        }
        draw();
        requestAnimationFrame(step);
    }
    step();
}

// --- Bellman-Ford ---
function bellmanFord(){
    let t=performance.now();
    let dist={},p={};

    for(let y=0;y<ROWS;y++){
        for(let x=0;x<COLS;x++){
            if(maze[y][x]===0) dist[key(x,y)]=Infinity;
        }
    }

    dist[key(...start)]=0;
    p[key(...start)]=null;

    let nodes=Object.keys(dist);

    for(let i=0;i<nodes.length-1;i++){
        for(let n of nodes){
            if(dist[n]===Infinity) continue;
            let [x,y]=n.split(",").map(Number);
            for(let [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){
                let nx=x+dx,ny=y+dy,k=key(nx,ny);
                if(k in dist && dist[n]+1<dist[k]){
                    dist[k]=dist[n]+1;
                    p[k]=n;
                    bellmanVisited.add(k);
                    bellmanStats.visited++;
                }
            }
        }
    }

    let cur=key(...end),l=0;
    while(cur){bellmanPath.add(cur);cur=p[cur];l++;}
    bellmanStats.pathLength=l;
    bellmanStats.time=(performance.now()-t).toFixed(2);

    draw();
}

// --- Ford-Fulkerson ---
function buildGraph() {
    let graph = {};
    for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
            if (maze[y][x] === 0) {
                let k = key(x, y);
                graph[k] = {};
                for (let [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
                    let nx = x + dx, ny = y + dy;
                    if (nx >= 0 && ny >= 0 && nx < COLS && ny < ROWS && maze[ny][nx] === 0) {
                        graph[k][key(nx, ny)] = 1;
                    }
                }
            }
        }
    }
    return graph;
}

function fordFulkerson() {
    let t = performance.now();
    let graph = buildGraph();
    let source = key(...start), sink = key(...end);
    let flow = 0;
    let residual = JSON.parse(JSON.stringify(graph));

    function dfsFF(u, minCap, visited) {
        if (u === sink) return minCap;
        visited.add(u);
        for (let v in residual[u]) {
            if (residual[u][v] > 0 && !visited.has(v)) {
                let pushed = dfsFF(v, Math.min(minCap, residual[u][v]), visited);
                if (pushed > 0) {
                    residual[u][v] -= pushed;
                    residual[v] = residual[v] || {};
                    residual[v][u] = (residual[v][u] || 0) + pushed;
                    ffVisited.add(v);
                    ffStats.visited++;
                    return pushed;
                }
            }
        }
        return 0;
    }

    function step() {
        let visited = new Set();
        let pushed = dfsFF(source, Infinity, visited);
        if (pushed > 0) {
            flow += pushed;
            ffPath = new Set([...visited]);
            draw();
            requestAnimationFrame(step);
        } else {
            ffStats.maxFlow = flow;
            ffStats.time = (performance.now() - t).toFixed(2);
            draw();
        }
    }
    step();
}

// --- Edmonds-Karp ---
function edmondsKarp() {
    let t = performance.now();
    let graph = buildGraph();
    let source = key(...start), sink = key(...end);
    let flow = 0;
    let residual = JSON.parse(JSON.stringify(graph));

    function bfsEK() {
        let q = [source];
        let parent = {};
        parent[source] = null;
        while (q.length) {
            let u = q.shift();
            for (let v in residual[u]) {
                if (residual[u][v] > 0 && !(v in parent)) {
                    parent[v] = u;
                    ekVisited.add(v);
                    ekStats.visited++;
                    if (v === sink) return parent;
                    q.push(v);
                }
            }
        }
        return null;
    }

    function step() {
        let parent = bfsEK();
        if (parent) {
            let path = [];
            let cur = sink;
            let minCap = Infinity;
            while (cur !== source) {
                let prev = parent[cur];
                minCap = Math.min(minCap, residual[prev][cur]);
                path.push(cur);
                cur = prev;
            }
            path.push(source);
            path.reverse();

            for (let i = 0; i < path.length - 1; i++) {
                let u = path[i], v = path[i+1];
                residual[u][v] -= minCap;
                residual[v] = residual[v] || {};
                residual[v][u] = (residual[v][u] || 0) + minCap;
            }

            flow += minCap;
            ekPath = new Set(path);
            draw();
            requestAnimationFrame(step);
        } else {
            ekStats.maxFlow = flow;
            ekStats.time = (performance.now() - t).toFixed(2);
            draw();
        }
    }
    step();
}

document.addEventListener("keydown",(e)=>{
    if(e.code==="Space") clearAll();

    if(e.key==="1") bfs();
    if(e.key==="2") dfs();
    if(e.key==="3") biBfs();
    if(e.key==="4") dijkstra();
    if(e.key==="5") aStar();
    if(e.key==="6") bellmanFord();
    if(e.key==="7") fordFulkerson();
    if(e.key==="8") edmondsKarp();

    if(e.key==="r"){
        generateMaze();
        clearAll();
    }
});

resetStats();
generateMaze();
draw();
</script>
</body>
</html>
